on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the build'
        required: true
      base-image:
        description: 'Base image from which to build'
        required: true
      builder-image:
        description: 'Image to use to compile wheels, if different from the base image'
        required: false
  push:
    paths:
      - "sglang/**"
      - ".github/workflows/sglang.yml"
      - ".github/workflows/build.yml"

concurrency:
  group: sglang-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      image-name: sglang
      folder: sglang
      dedicated-buildkit: true
      tag-suffix: ${{ inputs.tag || '69f6eda-nccl-cuda12.9.1-ubuntu22.04-nccl2.29.7-1-torch2.11.0-vision0.26.0-audio2.11.0-abi1' }}
      build-args: |
        BASE_IMAGE=${{ inputs.base-image || 'ghcr.io/coreweave/ml-containers/torch-extras:69f6eda-nccl-cuda12.9.1-ubuntu22.04-nccl2.29.7-1-torch2.11.0-vision0.26.0-audio2.11.0-abi1'}}
        BUILDER_IMAGE=${{ inputs.builder-image || '' }}
        BUILD_CCACHE_SIZE=5Gi
