on:
  push:
    paths:
      - "vllm-tensorizer/**"
      - ".github/configurations/vllm-tensorizer.yml"
      - ".github/workflows/vllm-tensorizer.yml"


jobs:
  get-config:
    name: Get vllm-tensorizer config
    uses: ./.github/workflows/read-configuration.yml
    with:
      path: ./.github/configurations/vllm-tensorizer.yml
  build:
    uses: ./.github/workflows/build.yml
    needs: get-config
    strategy:
      matrix: ${{ fromJSON(needs.get-config.outputs.config) }}
    secrets: inherit
    with:
      image-name: vllm-tensorizer
      folder: vllm-tensorizer
      tag-suffix: ${{ contains(matrix.base-image, 'cuda12.') && format('cuda12.9-{0}', matrix.vllm-commit) || format('cuda13.2-{0}', matrix.vllm-commit) }}
      build-contexts: |
        common=common
      object-storage-secrets: true
      build-args: |
        VLLM_COMMIT=${{ matrix.vllm-commit }}
        FLASHINFER_COMMIT=${{ matrix.flashinfer-commit }}
        LMCACHE_COMMIT=${{ matrix.lmcache-commit }}
        BUILDER_BASE_IMAGE=${{ matrix.base-image }}
        FINAL_BASE_IMAGE=${{ matrix.base-image }}
