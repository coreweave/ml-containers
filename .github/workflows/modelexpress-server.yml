on:
  push:
    paths:
      - "modelexpress-server/**"
      - ".github/workflows/modelexpress-server.yml"
      - ".github/configurations/modelexpress-server.yml"

jobs:
  get-config:
    name: Get modelexpress-server config
    uses: ./.github/workflows/read-configuration.yml
    with:
      path: ./.github/configurations/modelexpress-server.yml
  build:
    uses: ./.github/workflows/build.yml
    needs: get-config
    strategy:
      matrix: ${{ fromJSON(needs.get-config.outputs.config) }}
    secrets: inherit
    with:
      image-name: modelexpress-server
      folder: modelexpress-server
      build-args: |
        MODELEXPRESS_COMMIT=${{ matrix.modelexpress-commit }}