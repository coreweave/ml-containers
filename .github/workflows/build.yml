name: Build

on:
  workflow_call:
    inputs:
      folder:
        required: true
        type: string
      image-name:
        required: true
        type: string
      build-args:
        required: false
        type: string
      tag-suffix:
        required: false
        type: string
      cache-key:
        required: false
        description: "Optional sub-key to append to the image name for build layer caching"
        type: string
      platforms:
        required: false
        description: "Platforms for which to build (default: linux/amd64,linux/arm64)"
        type: string
        default: linux/amd64,linux/arm64
      buildkit-index:
        required: false
        description: "Index of the dedicated BuildKit endpoint pair to use (0, 1, ...). -1 uses shared consumer endpoints."
        type: number
        default: -1
    outputs:
      outcome:
        description: "The outcome of the build"
        value: ${{ jobs.build.outputs.outcome }}
      tags:
        description: "The resulting image tags"
        value: ${{ jobs.build.outputs.tags }}
      version:
        description: "The resulting image version"
        value: ${{ jobs.build.outputs.tags }}

jobs:
  build:
    name: Build Images
    runs-on: [ cw ]
    container: 'ghcr.io/coreweave/github-actions-images/github-base-runner:v1.9.0'
    timeout-minutes: 960
    defaults:
      run:
        shell: bash
    outputs:
      outcome: ${{ steps.docker-build.outcome }}
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Fetch BuildKit Client Certs
        uses: dopplerhq/secrets-fetch-action@451892f16195f9ac360e1a5bcbf0b5fd0e957534  # v2.0.0
        id: client-certs
        with:
          doppler-token: ${{ secrets.ORG_BUILDKIT_CLIENT_TOKEN }}
          doppler-project: ${{ secrets.BUILDKIT_CONSUMER_DOPPLER_PROJECT }}
          doppler-config: prod
          inject-env-vars: false
      - name: Resolve BuildKit endpoints
        id: buildkit
        env:
          BUILDKIT_CONSUMER_AMD64_ENDPOINT: ${{ secrets.BUILDKIT_CONSUMER_AMD64_ENDPOINT }}
          BUILDKIT_CONSUMER_ARM64_ENDPOINT: ${{ secrets.BUILDKIT_CONSUMER_ARM64_ENDPOINT }}
          BUILDKIT_DEDICATED_0_AMD64_ENDPOINT: ${{ secrets.BUILDKIT_DEDICATED_0_AMD64_ENDPOINT }}
          BUILDKIT_DEDICATED_0_ARM64_ENDPOINT: ${{ secrets.BUILDKIT_DEDICATED_0_ARM64_ENDPOINT }}
          BUILDKIT_DEDICATED_1_AMD64_ENDPOINT: ${{ secrets.BUILDKIT_DEDICATED_1_AMD64_ENDPOINT }}
          BUILDKIT_DEDICATED_1_ARM64_ENDPOINT: ${{ secrets.BUILDKIT_DEDICATED_1_ARM64_ENDPOINT }}
        run: |
          INDEX="${{ inputs.buildkit-index }}"
          if [ "$INDEX" -ge 0 ] 2>/dev/null; then
            PREFIX="BUILDKIT_DEDICATED_${INDEX}"
          else
            PREFIX="BUILDKIT_CONSUMER"
          fi
          AMD64="${PREFIX}_AMD64_ENDPOINT"
          ARM64="${PREFIX}_ARM64_ENDPOINT"
          echo "amd64=${!AMD64}" >> "$GITHUB_OUTPUT"
          echo "arm64=${!ARM64}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          driver: remote
          endpoint: ${{ steps.buildkit.outputs.amd64 }}
          platforms: linux/amd64
          append: |
            - endpoint: ${{ steps.buildkit.outputs.arm64 }}
              platforms: linux/arm64
        env:
          BUILDER_NODE_0_AUTH_TLS_CACERT: ${{ steps.client-certs.outputs.TLS_CACERT }}
          BUILDER_NODE_0_AUTH_TLS_CERT: ${{ steps.client-certs.outputs.TLS_CERT }}
          BUILDER_NODE_0_AUTH_TLS_KEY: ${{ steps.client-certs.outputs.TLS_KEY }}
          BUILDER_NODE_1_AUTH_TLS_CACERT: ${{ steps.client-certs.outputs.TLS_CACERT }}
          BUILDER_NODE_1_AUTH_TLS_CERT: ${{ steps.client-certs.outputs.TLS_CERT }}
          BUILDER_NODE_1_AUTH_TLS_KEY: ${{ steps.client-certs.outputs.TLS_KEY }}
      - name: Get base registry
        run: |
          echo "REGISTRY=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Set tag prefix
        if: github.ref_name != 'main'
        run: |
          echo "TAG_PREFIX=${{ github.ref_name }}-" >> $GITHUB_ENV
      - name: Set tag suffix
        if: inputs.tag-suffix != ''
        run: |
          echo "TAG_SUFFIX=-${{ inputs.tag-suffix }}" >> $GITHUB_ENV
      - name: Set cache key
        if: inputs.cache-key != ''
        run: |
          echo "CACHE_KEY=${{ inputs.image-name }}-${{ inputs.cache-key }}" >> $GITHUB_ENV
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image-name }}
          tags: |
            type=sha,prefix=${{ env.TAG_PREFIX }},suffix=${{ env.TAG_SUFFIX }},format=short
      - name: Initialize registry credentials file
        env:
          USER: ${{ github.actor }}
          PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -n '.auths."ghcr.io" = { username: env.USER, password: env.PASS }' \
          | install -m400 /dev/stdin ~/.docker/config.json
      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ${{ inputs.folder }}
          build-args: |-
            ${{ inputs.build-args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/buildcache:${{ env.CACHE_KEY || inputs.image-name }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/buildcache:${{ env.CACHE_KEY || inputs.image-name }},mode=max
          platforms: ${{ inputs.platforms }}
      - name: Clear registry credentials
        if: always()
        run: |
          rm -f ~/.docker/config.json && [ ! -e ~/.docker/config.json ]
      - name: Gather job summary
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.docker-build.outputs.digest }}
          BUILD_ARGS: ${{ inputs.build-args }}
        run: |
          {
            printf '## Built image info\n\n' && \
            printf '### Image\n\n```text\n%s\n```\n\n' "${TAGS:-Missing}" && \
            printf 'Digest: `%s`\n\n' "${DIGEST:-Missing}" && \
            if [ -n "${BUILD_ARGS}" ]; then
              printf '<details>\n<summary><h3>Build args</h3></summary>\n\n```ini\n%s\n```\n\n</details>\n' \
                "${BUILD_ARGS}";
            fi;
          } >> "${GITHUB_STEP_SUMMARY}"
      - uses: 8BitJonny/gh-get-current-pr@2501fb7d90d212808928edebbea7f1194b592fa0  # v2.1.3
        id: PR
        with:
          filterOutClosed: true
      - name: Comment
        if: steps.PR.outputs.number
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9  # v5.0.0
        with:
          issue-number: ${{ steps.PR.outputs.number }}
          body: >
            @${{ github.triggering_actor }} Build complete, ${{ steps.docker-build.outcome }}:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Image: `${{ steps.meta.outputs.tags }}`
