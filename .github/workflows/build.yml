name: Build

on:
  workflow_call:
    inputs:
      folder:
        required: true
        type: string
      image-name:
        required: true
        type: string
      build-args:
        required: false
        type: string
      tag-suffix:
        required: false
        type: string
      cache-key:
        required: false
        description: "Optional sub-key to append to the image name for build layer caching"
        type: string
      platforms:
        required: false
        description: "Platforms for which to build (default: linux/amd64,linux/arm64)"
        type: string
        default: linux/amd64,linux/arm64
    outputs:
      outcome:
        description: "The outcome of the build"
        value: ${{ jobs.merge.outputs.outcome }}
      tags:
        description: "The resulting image tags"
        value: ${{ jobs.merge.outputs.tags }}
      version:
        description: "The resulting image version"
        value: ${{ jobs.merge.outputs.version }}

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.platforms.outputs.matrix }}
      registry: ${{ steps.registry.outputs.value }}
      image: ${{ steps.registry.outputs.image }}
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
      labels: ${{ steps.meta.outputs.labels }}
      artifact-key: ${{ steps.artifact.outputs.key }}
    steps:
      - name: Compute registry
        id: registry
        run: |
          echo "value=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/${{ inputs.image-name }}" >> "$GITHUB_OUTPUT"
      - name: Set tag prefix
        if: github.ref_name != 'main'
        run: echo "TAG_PREFIX=${{ github.ref_name }}-" >> $GITHUB_ENV
      - name: Set tag suffix
        if: inputs.tag-suffix != ''
        run: echo "TAG_SUFFIX=-${{ inputs.tag-suffix }}" >> $GITHUB_ENV
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ steps.registry.outputs.image }}
          tags: |
            type=sha,prefix=${{ env.TAG_PREFIX }},suffix=${{ env.TAG_SUFFIX }},format=short
      - name: Compute artifact key
        id: artifact
        run: |
          KEY="${{ inputs.image-name }}"
          [ -z "${{ inputs.tag-suffix }}" ] || KEY="${KEY}-${{ inputs.tag-suffix }}"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"
      - name: Build platform matrix
        id: platforms
        env:
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          declare -A RUNNERS=( ["linux/amd64"]="ml-amd" ["linux/arm64"]="ml-arm" )
          ITEMS=()
          IFS=',' read -ra PLATS <<< "$PLATFORMS"
          for p in "${PLATS[@]}"; do
            p="$(echo "$p" | xargs)"
            RUNNER="${RUNNERS[$p]}"
            [ -n "$RUNNER" ] || { echo "::error::Unsupported platform: $p"; exit 1; }
            ITEMS+=("{\"platform\":\"$p\",\"runner\":\"$RUNNER\",\"arch\":\"${p#linux/}\"}")
          done
          IFS=','
          echo "matrix={\"include\":[${ITEMS[*]}]}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.arch }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 960
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: remote
          endpoint: unix:///run/buildkit/buildkitd.sock
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute cache key
        id: cache
        run: |
          KEY="${{ inputs.image-name }}"
          [ -z "${{ inputs.cache-key }}" ] || KEY="${KEY}-${{ inputs.cache-key }}"
          echo "ref=${{ needs.prepare.outputs.registry }}/buildcache:${KEY}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
      - name: Build and push by digest
        id: docker-build
        uses: docker/build-push-action@v7.0.0
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ${{ inputs.folder }}
          build-args: |-
            ${{ inputs.build-args }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ needs.prepare.outputs.image }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ steps.cache.outputs.ref }}
          cache-to: type=registry,ref=${{ steps.cache.outputs.ref }},mode=max
      - name: Export digest
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${{ steps.docker-build.outputs.digest }}"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ needs.prepare.outputs.artifact-key }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge Manifests
    needs: [prepare, build]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    outputs:
      outcome: ${{ steps.push.outcome }}
      tags: ${{ needs.prepare.outputs.tags }}
      version: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ needs.prepare.outputs.artifact-key }}-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        id: push
        working-directory: ${{ runner.temp }}/digests
        env:
          TAGS: ${{ needs.prepare.outputs.tags }}
          IMAGE: ${{ needs.prepare.outputs.image }}
        run: |
          TAG_ARGS=$(echo "$TAGS" | xargs -I {} echo "-t {}" | tr '\n' ' ')
          DIGEST_ARGS=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create $TAG_ARGS $DIGEST_ARGS
      - name: Gather job summary
        env:
          TAGS: ${{ needs.prepare.outputs.tags }}
          BUILD_ARGS: ${{ inputs.build-args }}
        run: |
          {
            printf '## Built image info\n\n' && \
            printf '### Image\n\n```text\n%s\n```\n\n' "${TAGS:-Missing}" && \
            if [ -n "${BUILD_ARGS}" ]; then
              printf '<details>\n<summary><h3>Build args</h3></summary>\n\n```ini\n%s\n```\n\n</details>\n' \
                "${BUILD_ARGS}";
            fi;
          } >> "${GITHUB_STEP_SUMMARY}"
      - uses: 8BitJonny/gh-get-current-pr@2.1.3
        id: PR
        with:
          filterOutClosed: true
      - name: Comment
        if: steps.PR.outputs.number
        uses: peter-evans/create-or-update-comment@v5.0.0
        with:
          issue-number: ${{ steps.PR.outputs.number }}
          body: >
            @${{ github.triggering_actor }} Build complete, ${{ steps.push.outcome }}:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Image: `${{ needs.prepare.outputs.tags }}`
