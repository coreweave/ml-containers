name: Build

on:
  workflow_call:
    inputs:
      folder:
        required: true
        type: string
      image-name:
        required: true
        type: string
      build-args:
        required: false
        type: string
      tag-suffix:
        required: false
        type: string
      cache-key:
        required: false
        description: "Optional sub-key to append to the image name for build layer caching"
        type: string
      platforms:
        required: false
        description: "Platforms for which to build (default: linux/amd64,linux/arm64)"
        type: string
        default: linux/amd64,linux/arm64
    outputs:
      outcome:
        description: "The outcome of the build"
        value: ${{ jobs.merge.outputs.outcome }}
      tags:
        description: "The resulting image tags"
        value: ${{ jobs.merge.outputs.tags }}
      version:
        description: "The resulting image version"
        value: ${{ jobs.merge.outputs.version }}

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.platforms.outputs.matrix }}
      registry: ${{ steps.registry.outputs.value }}
      image: ${{ steps.registry.outputs.image }}
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Compute registry
        id: registry
        run: |
          echo "value=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/${{ inputs.image-name }}" >> "$GITHUB_OUTPUT"
      - name: Set tag prefix
        if: github.ref_name != 'main'
        run: echo "TAG_PREFIX=${{ github.ref_name }}-" >> $GITHUB_ENV
      - name: Set tag suffix
        if: inputs.tag-suffix != ''
        run: echo "TAG_SUFFIX=-${{ inputs.tag-suffix }}" >> $GITHUB_ENV
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ steps.registry.outputs.image }}
          tags: |
            type=sha,prefix=${{ env.TAG_PREFIX }},suffix=${{ env.TAG_SUFFIX }},format=short
      - name: Build platform matrix
        id: platforms
        env:
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          MATRIX=$(jq -nc --arg p "$PLATFORMS" '{include: [
            {platform: "linux/amd64", runner: "ml-amd", arch: "amd64"},
            {platform: "linux/arm64", runner: "ml-arm", arch: "arm64"}
          ] | map(select($p | contains(.platform)))}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.arch }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 960
    defaults:
      run:
        shell: bash
    outputs:
      digest-amd64: ${{ steps.export.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.export.outputs.digest-arm64 }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: remote
          endpoint: unix:///run/buildkit/buildkitd.sock
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute cache key
        id: cache
        run: |
          KEY="${{ inputs.image-name }}"
          [ -z "${{ inputs.cache-key }}" ] || KEY="${KEY}-${{ inputs.cache-key }}"
          echo "ref=${{ needs.prepare.outputs.registry }}/buildcache:${KEY}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
      - name: Build and push by digest
        id: docker-build
        uses: docker/build-push-action@v7.0.0
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ${{ inputs.folder }}
          build-args: |-
            ${{ inputs.build-args }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ needs.prepare.outputs.image }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ steps.cache.outputs.ref }}
          cache-to: type=registry,ref=${{ steps.cache.outputs.ref }},mode=max
      - name: Export digest
        id: export
        run: echo "digest-${{ matrix.arch }}=${{ steps.docker-build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  merge:
    name: Merge Manifests
    needs: [prepare, build]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    outputs:
      outcome: ${{ steps.push.outcome }}
      tags: ${{ needs.prepare.outputs.tags }}
      version: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        id: push
        env:
          TAGS: ${{ needs.prepare.outputs.tags }}
          IMAGE: ${{ needs.prepare.outputs.image }}
          DIGEST_AMD64: ${{ needs.build.outputs.digest-amd64 }}
          DIGEST_ARM64: ${{ needs.build.outputs.digest-arm64 }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && tag_args+=("-t" "$tag")
          done <<< "$TAGS"

          digest_args=()
          for digest in "$DIGEST_AMD64" "$DIGEST_ARM64"; do
            [[ -n "$digest" ]] && digest_args+=("$IMAGE@$digest")
          done

          docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"
      - name: Gather job summary
        env:
          TAGS: ${{ needs.prepare.outputs.tags }}
          BUILD_ARGS: ${{ inputs.build-args }}
        run: |
          {
            printf '## Built image info\n\n' && \
            printf '### Image\n\n```text\n%s\n```\n\n' "${TAGS:-Missing}" && \
            if [ -n "${BUILD_ARGS}" ]; then
              printf '<details>\n<summary><h3>Build args</h3></summary>\n\n```ini\n%s\n```\n\n</details>\n' \
                "${BUILD_ARGS}";
            fi;
          } >> "${GITHUB_STEP_SUMMARY}"
      - uses: 8BitJonny/gh-get-current-pr@2.1.3
        id: PR
        with:
          filterOutClosed: true
      - name: Comment
        if: steps.PR.outputs.number
        uses: peter-evans/create-or-update-comment@v5.0.0
        with:
          issue-number: ${{ steps.PR.outputs.number }}
          body: >
            @${{ github.triggering_actor }} Build complete, ${{ steps.push.outcome }}:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Image: `${{ needs.prepare.outputs.tags }}`
