on:
  workflow_dispatch:
  push:
    paths:
      - "nixlbench-debug/**"
      - ".github/workflows/nixlbench-debug.yml"
      - ".github/workflows/build.yml"

jobs:
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      image-name: nixlbench-debug
      folder: nixlbench-debug
      platforms: linux/arm64
